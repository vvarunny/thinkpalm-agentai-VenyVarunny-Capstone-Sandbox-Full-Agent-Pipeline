<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Pipeline Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-idle { background: #6c757d; }
        .status-working { background: #007bff; }
        .status-processing { background: #17a2b8; }
        .status-completed { background: #28a745; }
        .status-error { background: #dc3545; }
        
        .agent-item, .task-item, .workflow-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .agent-item h4, .task-item h4, .workflow-item h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .agent-item p, .task-item p, .workflow-item p {
            color: #666;
            font-size: 0.9rem;
            margin: 3px 0;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .controls h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .form-group select:focus, .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .logs {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-height: 400px;
            overflow-y: auto;
        }
        
        .logs h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .log-entry {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        
        .log-entry.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        
        .log-entry.success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-card h4 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .metric-card p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            background: white;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            background: #f8f9fa;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }
        
        .tab:first-child {
            border-radius: 12px 0 0 0;
        }
        
        .tab:last-child {
            border-radius: 0 12px 0 0;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .tab-content {
            background: white;
            border-radius: 0 0 12px 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .tab-panel {
            display: none;
        }
        
        .tab-panel.active {
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agentic Pipeline Dashboard</h1>
            <p>Multi-Agent System with Memory, Tool-Calling, and Real-Time Coordination</p>
        </div>
        
        <div class="metrics" id="metrics">
            <div class="metric-card">
                <h4 id="total-agents">0</h4>
                <p>Active Agents</p>
            </div>
            <div class="metric-card">
                <h4 id="running-tasks">0</h4>
                <p>Running Tasks</p>
            </div>
            <div class="metric-card">
                <h4 id="completed-tasks">0</h4>
                <p>Completed Tasks</p>
            </div>
            <div class="metric-card">
                <h4 id="active-workflows">0</h4>
                <p>Active Workflows</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('agents')">Agents</button>
            <button class="tab" onclick="showTab('tasks')">Tasks</button>
            <button class="tab" onclick="showTab('workflows')">Workflows</button>
            <button class="tab" onclick="showTab('controls')">Controls</button>
            <button class="tab" onclick="showTab('logs')">Logs</button>
        </div>
        
        <div class="tab-content">
            <div id="agents-panel" class="tab-panel active">
                <div class="dashboard" id="agents-container">
                    <!-- Agents will be populated here -->
                </div>
            </div>
            
            <div id="tasks-panel" class="tab-panel">
                <div class="dashboard" id="tasks-container">
                    <!-- Tasks will be populated here -->
                </div>
            </div>
            
            <div id="workflows-panel" class="tab-panel">
                <div class="dashboard" id="workflows-container">
                    <!-- Workflows will be populated here -->
                </div>
            </div>
            
            <div id="controls-panel" class="tab-panel">
                <div class="controls">
                    <h3>Submit Task</h3>
                    <div class="form-group">
                        <label for="task-agent">Target Agent:</label>
                        <select id="task-agent">
                            <option value="research-001">Research Agent</option>
                            <option value="analysis-001">Analysis Agent</option>
                            <option value="coordinator-001">Coordinator Agent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-type">Task Type:</label>
                        <select id="task-type">
                            <option value="research">Research Task</option>
                            <option value="analysis">Analysis Task</option>
                            <option value="workflow">Workflow Task</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-query">Query/Parameters:</label>
                        <textarea id="task-query" rows="3" placeholder="Enter your query or task parameters..."></textarea>
                    </div>
                    <button class="btn" onclick="submitTask()">Submit Task</button>
                </div>
                
                <div class="controls">
                    <h3>Execute Workflow</h3>
                    <div class="form-group">
                        <label for="workflow-type">Workflow Type:</label>
                        <select id="workflow-type">
                            <option value="research_analysis">Research & Analysis</option>
                            <option value="data_pipeline">Data Pipeline</option>
                            <option value="multi_agent_coordination">Multi-Agent Coordination</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="workflow-input">Input Data:</label>
                        <textarea id="workflow-input" rows="3" placeholder="Enter workflow input data..."></textarea>
                    </div>
                    <button class="btn btn-success" onclick="executeWorkflow()">Execute Workflow</button>
                </div>
            </div>
            
            <div id="logs-panel" class="tab-panel">
                <div class="logs" id="logs-container">
                    <!-- Logs will be populated here -->
                </div>
            </div>
        </div>
    </div>
    
    <div id="root"></div>

<script>
// Store socket connection globally
let socket = null;

// Initialize socket connection
function initSocket() {
  if (socket) {
    console.log('Socket already exists');
    return;
  }
  
  console.log('Creating socket connection...');
  socket = io();
  
  socket.on('connect', () => {
    console.log('Connected to server');
    addLogEntry('Connected to server', 'success');
  });

  socket.on('disconnect', () => {
    console.log('Disconnected from server');
    addLogEntry('Disconnected from server', 'error');
  });

  socket.on('task_submitted', (task) => {
    console.log('Task submitted event received:', task);
    addLogEntry(`Task submitted: ${task.task_id}`, 'info');
    updateTaskDisplay(task, 'submitted');
  });

  socket.on('task_started', (task) => {
    console.log('Task started event received:', task);
    addLogEntry(`Task started: ${task.task.id}`, 'info');
    updateTaskDisplay(task, 'running');
  });

  socket.on('task_completed', (task) => {
    console.log('Task completed event received:', task);
    addLogEntry(`Task completed: ${task.task.id}`, 'success');
    updateTaskDisplay(task, 'completed');
    displayTaskResult(task);
  });

  socket.on('task_failed', (task) => {
    console.log('Task failed event received:', task);
    addLogEntry(`Task failed: ${task.task.id} - ${task.error}`, 'error');
    updateTaskDisplay(task, 'failed');
  });

  socket.on('workflow_completed', (workflow) => {
    console.log('Workflow completed event received:', workflow);
    addLogEntry(`Workflow completed: ${workflow.id}`, 'success');
    displayWorkflowResult(workflow);
  });

  socket.on('workflow_failed', (workflow) => {
    console.log('Workflow failed event received:', workflow);
    addLogEntry(`Workflow failed: ${workflow.id} - ${workflow.error}`, 'error');
  });

  socket.on('error', (error) => {
    console.log('Socket error:', error);
    addLogEntry(`Error: ${error.message}`, 'error');
  });

  socket.on('connect_error', (error) => {
    console.log('Connection error:', error);
    addLogEntry(`Connection error: ${error.message}`, 'error');
  });
}

function submitTask() {
  const agentId = document.getElementById('task-agent').value;
  const taskType = document.getElementById('task-type').value;
  const query = document.getElementById('task-query').value;

  if (!query.trim()) {
    addLogEntry('Please enter a query or parameters', 'error');
    return;
  }

  const task = {
    type: taskType,
    agent_id: agentId,
    parameters: {
      query: query,
      analysis_type: 'summary'
    }
  };

  if (socket) {
    socket.emit('submit_task', { task, priority: 'normal' });
    addLogEntry(`Task submitted: ${taskType} - ${query}`, 'info');
    document.getElementById('task-query').value = '';
  } else {
    addLogEntry('Socket not connected. Please refresh the page.', 'error');
  }
}

function executeWorkflow() {
  const workflowType = document.getElementById('workflow-type').value;
  const input = document.getElementById('workflow-input').value;

  if (!input.trim()) {
    addLogEntry('Please enter workflow input data', 'error');
    return;
  }

  const workflow = getWorkflowDefinition(workflowType, input);
  
  if (socket) {
    socket.emit('execute_workflow', { 
      workflow, 
      context: { input } 
    });
    addLogEntry(`Workflow executed: ${workflowType}`, 'info');
    document.getElementById('workflow-input').value = '';
  } else {
    addLogEntry('Socket not connected. Please refresh the page.', 'error');
  }
}

function getWorkflowDefinition(type, input) {
  switch (type) {
    case 'research_analysis':
      return {
        type: 'research_analysis',
        steps: [
          {
            name: 'research',
            type: 'agent_task',
            agent_id: 'research-001',
            task_type: 'research',
            parameters: { query: input }
          },
          {
            name: 'analysis',
            type: 'agent_task',
            agent_id: 'analysis-001',
            task_type: 'analysis',
            parameters: { data: 'research_result' }
          }
        ]
      };
    
    case 'data_pipeline':
      return {
        type: 'data_pipeline',
        steps: [
          {
            name: 'collection',
            type: 'agent_task',
            agent_id: 'research-001',
            task_type: 'data_gathering',
            parameters: { sources: [input] }
          },
          {
            name: 'processing',
            type: 'agent_task',
            agent_id: 'analysis-001',
            task_type: 'process_data',
            parameters: { pipeline: [{ operation: 'filter' }] }
          }
        ]
      };
    
    case 'multi_agent_coordination':
      return {
        type: 'multi_agent_coordination',
        steps: [
          {
            name: 'coordination',
            type: 'agent_task',
            agent_id: 'coordinator-001',
            task_type: 'coordinate_workflow',
            parameters: {
              workflow_definition: {
                type: 'coordinated_research',
                agents: ['research-001', 'analysis-001'],
                steps: [
                  { agent_id: 'research-001', task_type: 'research' },
                  { agent_id: 'analysis-001', task_type: 'analysis' }
                ]
              }
            }
          }
        ]
      };
    
    default:
      return { type: 'simple', steps: [] };
  }
}

function addLogEntry(message, type = 'info') {
  console.log(`Adding log entry: [${type}] ${message}`);
  
  const timestamp = new Date().toLocaleTimeString();
  const logsContainer = document.getElementById('logs-container');
  
  if (!logsContainer) {
    console.error('Logs container not found!');
    return;
  }
  
  const logEntry = document.createElement('div');
  logEntry.className = `log-entry ${type}`;
  logEntry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
  
  logsContainer.appendChild(logEntry);
  logsContainer.scrollTop = logsContainer.scrollHeight;
  
  console.log(`Log entry added. Total logs: ${logsContainer.children.length}`);
  
  // Keep only last 50 logs
  while (logsContainer.children.length > 50) {
    logsContainer.removeChild(logsContainer.firstChild);
  }
}

function updateTaskDisplay(task, status) {
  console.log(`Updating task display: ${task.task_id || task.id} -> ${status}`);
  
  // Find or create the tasks container
  let tasksContainer = document.getElementById('tasks-display');
  if (!tasksContainer) {
    createTasksDisplay();
    tasksContainer = document.getElementById('tasks-display');
  }
  
  // Look for existing task element
  let taskElement = document.getElementById(`task-${task.task_id || task.id}`);
  
  if (!taskElement) {
    // Create new task element
    taskElement = document.createElement('div');
    taskElement.id = `task-${task.task_id || task.id}`;
    taskElement.className = 'task-item';
    tasksContainer.appendChild(taskElement);
  }
  
  // Update task display based on status
  const statusClass = status === 'completed' ? 'success' : status === 'failed' ? 'error' : status === 'running' ? 'warning' : 'info';
  
  taskElement.innerHTML = `
    <h4>Task ${task.task_id || task.id}</h4>
    <p><strong>Status:</strong> <span class="status-${status}">${status}</span></p>
    <p><strong>Type:</strong> ${task.task?.type || 'Unknown'}</p>
    ${task.task?.parameters?.query ? `<p><strong>Query:</strong> ${task.task.parameters.query}</p>` : ''}
    <p><strong>Updated:</strong> ${new Date().toLocaleTimeString()}</p>
  `;
  
  console.log(`Task display updated for ${task.task_id || task.id}`);
}

function createTasksDisplay() {
  const tasksPanel = document.getElementById('tasks-panel');
  if (!tasksPanel) return;
  
  const tasksDiv = document.createElement('div');
  tasksDiv.className = 'controls';
  tasksDiv.innerHTML = `
    <h3>Active Tasks</h3>
    <div id="tasks-display" class="tasks-list">
      <!-- Tasks will be displayed here -->
    </div>
  `;
  tasksPanel.appendChild(tasksDiv);
}

function displayTaskResult(task) {
  const resultsContainer = document.getElementById('results-container');
  if (!resultsContainer) {
    createResultsContainer();
  }
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-item';
  resultDiv.innerHTML = `
    <h4>Task Result - ${task.task.type}</h4>
    <p><strong>Task ID:</strong> ${task.task.id}</p>
    <p><strong>Status:</strong> ${task.status}</p>
    <p><strong>Completed:</strong> ${task.completed_at}</p>
    <div class="result-content">
      <pre>${JSON.stringify(task.result, null, 2)}</pre>
    </div>
  `;
  
  document.getElementById('results-container').appendChild(resultDiv);
}

function displayWorkflowResult(workflow) {
  const resultsContainer = document.getElementById('results-container');
  if (!resultsContainer) {
    createResultsContainer();
  }
  
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-item';
  resultDiv.innerHTML = `
    <h4>Workflow Result - ${workflow.type}</h4>
    <p><strong>Workflow ID:</strong> ${workflow.id}</p>
    <p><strong>Status:</strong> ${workflow.status}</p>
    <p><strong>Steps:</strong> ${workflow.steps?.length || 0}</p>
    <p><strong>Completed:</strong> ${workflow.completed_at}</p>
    <div class="result-content">
      <pre>${JSON.stringify(workflow.results, null, 2)}</pre>
    </div>
  `;
  
  document.getElementById('results-container').appendChild(resultDiv);
}

function createResultsContainer() {
  const controlsPanel = document.getElementById('controls-panel');
  const resultsDiv = document.createElement('div');
  resultsDiv.className = 'controls';
  resultsDiv.innerHTML = `
    <h3>Task & Workflow Results</h3>
    <div id="results-container" class="results-list">
      <!-- Results will be displayed here -->
    </div>
  `;
  controlsPanel.appendChild(resultsDiv);
}

// Initialize socket when page loads
document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM loaded, initializing socket...');
  initSocket();
  
  // Add initial log entry
  setTimeout(() => {
    addLogEntry('System initialized - ready to submit tasks', 'success');
  }, 1000);
});
</script>

<style>
.result-item {
  background: #f8f9fa;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 4px solid #28a745;
}

.result-item h4 {
  color: #333;
  margin-bottom: 10px;
}

.result-item p {
  color: #666;
  margin: 5px 0;
}

.result-content {
  background: white;
  border-radius: 4px;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ddd;
}

.result-content pre {
  margin: 0;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
}

.results-list {
  max-height: 400px;
  overflow-y: auto;
}

.task-item {
  background: #f8f9fa;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
  border-left: 4px solid #007bff;
}

.task-item h4 {
  color: #333;
  margin-bottom: 10px;
}

.task-item p {
  color: #666;
  margin: 5px 0;
}

.status-submitted { color: #6c757d; }
.status-running { color: #007bff; }
.status-completed { color: #28a745; }
.status-failed { color: #dc3545; }

.tasks-list {
  max-height: 400px;
  overflow-y: auto;
}
</style>

</body>
</html>
